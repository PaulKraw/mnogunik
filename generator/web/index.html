<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mfaka — Фоновый запуск</title>
  <style>
    :root{
      --bg:#0f172a; --panel:#0b1220; --border:#1f2937; --text:#e5e7eb; --muted:#94a3b8;
      --accent:#22d3ee; --accent2:#a78bfa; --ok:#34d399; --warn:#fbbf24; --err:#fb7185;
      --shadow:0 18px 40px rgba(0,0,0,.35); --r:16px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0; font-family:Inter,system-ui,Segoe UI,Roboto,Arial; background:radial-gradient(1200px 800px at 80% -10%, rgba(34,211,238,.08), transparent 60%),
                         radial-gradient(1000px 700px at 0% 0%, rgba(167,139,250,.08), transparent 55%), var(--bg); color:var(--text);}
    .wrap{max-width:1100px; margin:0 auto; padding:20px}
    header{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px}
    .brand{display:flex; align-items:center; gap:10px}
    .logo{
      width:66px; height:66px; border-radius:0px;
      background:
        url("LOGO_MNOGUNIK.png") center / cover no-repeat;
      box-shadow:var(--shadow);
    }
    h1{font-size:18px; margin:0}
    .badge{display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border-radius:999px; background:rgba(34,211,238,.12); border:1px solid rgba(34,211,238,.25); color:#cffafe; font-weight:700; font-size:12px}

    .panel{background:var(--panel); border:1px solid var(--border); border-radius:18px; box-shadow:var(--shadow); padding:16px}
    .row{display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:12px}
    input,button{padding:12px 14px; border-radius:12px; border:1px solid var(--border); background:#0a0f1f; color:var(--text)}
    input[type="number"]{width:220px}
    button{cursor:pointer; border:0; font-weight:800; letter-spacing:.2px; box-shadow:var(--shadow)}
    .primary{background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#0b1020}
    .ghost{background:#0a0f1f; color:var(--text); border:1px solid var(--border)}

    .meta{display:flex; gap:8px; flex-wrap:wrap}
    .tag{display:inline-flex; gap:8px; align-items:center; padding:6px 10px; border-radius:999px; background:#0a0f1f; border:1px solid var(--border); color:#cbd5e1; font-size:12px}
    .ok{background:rgba(52,211,153,.12); border-color:rgba(52,211,153,.25); color:#d1fae5}
    .warn{background:rgba(251,191,36,.12); border-color:rgba(251,191,36,.25); color:#fef3c7}
    .err{background:rgba(251,113,133,.12); border-color:rgba(251,113,133,.25); color:#ffe4e6}

    pre{white-space:pre-wrap; background:#020617; color:#cde3ff; padding:14px; border-radius:14px; min-height:360px; overflow:auto; border:1px solid var(--border)}
    small{color:var(--muted)}
    .status{margin-top:6px; font-size:14px; color:var(--muted)}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand"><div class="logo"></div><h1>GO MNOGunik · фоновый запуск</h1></div>
      <div class="badge">🚀 запускает скрипт на Python3</div>
    </header>

    <section class="panel">
      <div class="row">
        <input id="genimg" type="checkbox"><label for="genimg">сгенерировать новые картинки</label>
      </div>
      <div class="row">
        <input type="password" id="scriptKey" placeholder="Введите ключ" />
        <input type="number" id="startIndex" min="0" max="100000000" placeholder="0 (по умолчанию)" />
        <button id="btnStart" class="primary">Запустить</button>
        <button id="btnStop" class="ghost">Стоп</button>
        <button id="btnParseLinks" class="ghost">Парсить ссылки (5×5с)</button>
        <div class="meta">
          <span id="flagRun" class="tag">Флаг: <b style="margin-left:6px" id="flagVal">idle</b></span>
          <span id="logState" class="tag warn">лог: неизвестно</span>
          <span id="tip" class="tag">обновление: 2s • процессы 30s</span>
          <span id="procTag" class="tag warn">процессы: ?</span>
          <span id="parseIter" class="tag">итерация: —</span>
<span id="linksFound" class="tag">ссылок: 0</span>
        </div>
      </div>
      <div class="links-panel" style="background: var(--panel); border: 1px solid var(--border); border-radius: 18px; padding: 16px; margin-bottom: 16px;">
  <h3 style="margin: 0 0 12px 0; font-size: 1.1rem;">📎 Найденные ссылки (CSV / XML / preview)</h3>
  <div id="linksContainer" style="max-height: 250px; overflow-y: auto; background: #0a0f1f; border-radius: 14px; padding: 8px 12px;">
    <div class="empty-state" style="color: var(--muted); text-align: center; padding: 20px;">Нажмите «Парсить ссылки»</div>
  </div>
</div>
      <small id="info">Ожидание запуска…</small>
      <pre id="output">Лог ещё не загружен…</pre>
      <div class="status" id="status"></div>
    </section>
  </div>

    <script>
      document.getElementById('genimg').addEventListener('change', async function () {
          const isChecked = this.checked;

          // отправляем запрос: создать или удалить флаг
          try {
              const r = await fetch('genimg_flag.php?set=' + (isChecked ? '1' : '0'));
              const t = await r.text();
              console.log(t);
          } catch(e){
              alert('Ошибка: ' + e);
          }
      });
</script>

  <script>
    // --- Elements
    const $key   = document.getElementById('scriptKey');
    const $idx   = document.getElementById('startIndex');
    const $out   = document.getElementById('output');
    const $info  = document.getElementById('info');
    const $status= document.getElementById('status');
    const $flagVal = document.getElementById('flagVal');
    const $logState = document.getElementById('logState');

    // --- State
    let isRunning = false;         // локальный флаг «мы запустили из этого окна»
    let logPollTimer = null;       // таймер опроса лога
    let idxPollTimer = null;       // таймер опроса индекса
    let lastLogSample = '';        // последний снимок лога (текст)
    let lastLogTime = 0;           // timestamp последнего изменения

    // --- Helpers
    const setFlag = (val) => { isRunning = !!val; $flagVal.textContent = isRunning ? 'running' : 'idle'; };
    const setLogBadge = (type, text) => {
      $logState.className = 'tag ' + (type || '');
      $logState.textContent = text || '';
    };
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    // --- Stop button
    document.getElementById('btnStop').addEventListener('click', async () => {
      const key = $key.value.trim();
      if (!key) { alert('Введите ключ'); return; }
      try {
        const r = await fetch('stop.php?key=' + encodeURIComponent(key));
        const t = await r.text();
        alert(t);
        setFlag(false);
        $status.textContent = 'Остановлено пользователем.';
      } catch(e){ alert('Ошибка: ' + e); }
    });

    // --- Start button with logic
    document.getElementById('btnStart').addEventListener('click', onStartClick);

    async function onStartClick(){
      const key = $key.value.trim();
      if (!key) { alert('Введите ключ'); return; }

      if (!isRunning){
        // Первый запуск с момента открытия
        const ok = confirm('Точно запускаем? Нет ли открытых запусков на сервере?');
        if (!ok) return;
        await attemptStart(key);
        return;
      }

      // Повторное нажатие — проверяем активность лога в течение 5 секунд
      $status.textContent = 'Проверяем лог в течение 5 секунд…';
      const active = await isLogActiveWithin(5000);
      if (active){
        alert('Нельзя запускать: сейчас работает скрипт (лог меняется).');
        $status.textContent = 'Скрипт, похоже, работает — лог активен.';
        return;
      }

      // Лог не менялся → спрашиваем как в первый раз
      const ok2 = confirm('Лог не изменялся 5 сек. Точно запускаем? Нет ли открытых запусков на сервере?');
      if (!ok2) return;
      await attemptStart(key);
    }

    async function attemptStart(key){
      const v = ($idx.value || '').trim();
      if (v !== '' && !/^\d+$/.test(v)) { alert('Только цифры или пусто'); return; }

      const form = new FormData();
      form.append('startIndex', v);

      try{
        const res = await fetch('run.php?key=' + encodeURIComponent(key), { method:'POST', body: form });
        const text = await res.text();
        $out.textContent = text || 'Скрипт запущен';
        $info.textContent = 'Стартовый индекс: ' + (v === '' ? '0' : v);
        setFlag(true);
        startPolling();
      }catch(err){
        $out.textContent = 'Ошибка запуска: ' + err;
        setFlag(false);
      }
    }

    // --- Polling
    function startPolling(){
      // не плодим таймеры
      if (!logPollTimer){ logPollTimer = setInterval(loadLog, 2000); }
      if (!idxPollTimer){ idxPollTimer = setInterval(syncIndexFromFile, 2000); }
      if (!procTimer){    procTimer   = setInterval(checkProcs, 30000); }
      loadLog(); // мгновенный первый запрос
      syncIndexFromFile();
      checkProcs(); // сразу показать текущий статус
    }

    async function loadLog(){
      try{
        const res = await fetch('log.php?ts=' + Date.now(), { cache:'no-store' });
        const text = await res.text();
        // сравниваем с предыдущим снэпшотом
        if (text !== lastLogSample){
          lastLogSample = text;
          lastLogTime = Date.now();
          setLogBadge('ok', 'лог: активен');
        } else {
          // не изменился
          if (Date.now() - lastLogTime > 10000){ // >10s без изменений
            setLogBadge('warn', 'лог: тишина >10с');
          }
        }
        $out.textContent = text || '';
        $out.scrollTop = $out.scrollHeight;
      }catch(e){ /* молча */ }
    }

    async function syncIndexFromFile(){
      try{
        const res = await fetch('start_index.txt?ts=' + Date.now(), { cache:'no-store' });
        if (!res.ok) return;
        const t = (await res.text()).trim();
        if (document.activeElement !== $idx){
          $idx.value = t === '' ? '' : Number(t);
        }
      }catch(e){ /* ignore */ }
    }

    async function isLogActiveWithin(windowMs){
      // Берём снимок сейчас и через windowMs — сравниваем
      let before = '';
      try{ before = await (await fetch('log.php?ts=' + Date.now(), { cache:'no-store' })).text(); }
      catch(e){ before = ''; }
      await sleep(windowMs);
      let after = '';
      try{ after = await (await fetch('log.php?ts=' + Date.now(), { cache:'no-store' })).text(); }
      catch(e){ after = ''; }
      return before !== after; // true — активен
    }

    // Автостарт поллинга, чтобы видеть текущий статус сразу после открытия страницы
    startPolling();


    const $procTag = document.getElementById('procTag');
    let procTimer = null;
    let lastProcCount = null;

    function setProcTag(count){
      $procTag.className = 'tag ' + (count > 0 ? 'ok' : 'warn');
      $procTag.textContent = 'процессы: ' + count;
    }

    async function checkProcs(){
      const key = ($key.value || '').trim();
      if (!key) return; // без ключа не палим статус

      try{
        const res = await fetch('status.php?key=' + encodeURIComponent(key) + '&ts=' + Date.now(), {cache:'no-store'});
        if(!res.ok) return;
        const data = await res.json();
        const count = Number(data.count || 0);
        setProcTag(count);

        // если процессов нет — чистим лог и показываем краткую инструкцию
        if (count === 0 && lastProcCount !== 0){
          try {
            await fetch('log_clear.php?key=' + encodeURIComponent(key) + '&ts=' + Date.now(), {cache:'no-store'});
          } catch(e){}
          const help = [
            'Скрипт не запущен.',
            'Нажмите "Запустить", укажите ключ и (необязательно) стартовый индекс.',
            'Панель ниже обновляет лог каждые 2 секунды, а статус процессов — каждые 30 секунд.'
          ].join('\n');
          $out.textContent = help;
          setFlag(false);
        }
        lastProcCount = count;
      }catch(e){
        // молча
      }
    }
  </script>
<script>
  // ========== ПАРСЕР ССЫЛОК ==========
const $btnParse = document.getElementById('btnParseLinks');
const $linksContainer = document.getElementById('linksContainer');
const $parseIterSpan = document.getElementById('parseIter');
const $linksFoundSpan = document.getElementById('linksFound');

let parseInterval = null;
let currentParseIter = 0;

// Извлечение ссылок из текста (экранированные &lt;a...&gt; и обычные)
function extractLinksFromText(text) {
  const links = [];
  // Экранированные теги &lt;a href="..." ... &gt;текст&lt;/a&gt;
  const escapedRegex = /&lt;a\s+href="([^"]+)"(?:\s+[^&gt;]*)?&gt;(.*?)&lt;\/a&gt;/gi;
  let match;
  while ((match = escapedRegex.exec(text)) !== null) {
    let href = match[1].replace(/&quot;/g, '"').replace(/&amp;/g, '&');
    let content = match[2].replace(/&quot;/g, '"').replace(/&amp;/g, '&');
    links.push({ href, text: content });
  }
  // Обычные теги (на случай, если появятся)
  const plainRegex = /<a\s+href="([^"]+)"(?:\s+[^>]*)?>(.*?)<\/a>/gi;
  while ((match = plainRegex.exec(text)) !== null) {
    links.push({ href: match[1], text: match[2] });
  }
  // Уникальные по href
  const unique = [];
  const seen = new Set();
  for (const link of links) {
    if (!seen.has(link.href)) {
      seen.add(link.href);
      unique.push(link);
    }
  }
  return unique;
}

// Отрисовка ссылок в контейнере
function renderLinks(links) {
  if (!links.length) {
    $linksContainer.innerHTML = '<div class="empty-state" style="color: var(--muted); text-align: center; padding: 20px;">🔍 Ссылки не найдены</div>';
    $linksFoundSpan.textContent = '0';
    return;
  }
  const ul = document.createElement('ul');
  ul.style.margin = '0';
  ul.style.paddingLeft = '20px';
  for (const link of links) {
    const li = document.createElement('li');
    li.style.margin = '8px 0';
    const a = document.createElement('a');
    a.href = link.href;
    a.textContent = link.text || link.href;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.style.color = 'var(--accent)';
    li.appendChild(a);
    ul.appendChild(li);
  }
  $linksContainer.innerHTML = '';
  $linksContainer.appendChild(ul);
  $linksFoundSpan.textContent = links.length;
}

// Одна итерация парсинга
function runParseIteration(iterNumber) {
  const logText = $out.innerText || $out.textContent;
  const links = extractLinksFromText(logText);
  renderLinks(links);
  $parseIterSpan.textContent = `итерация: ${iterNumber}/5`;
  return links;
}

// Запуск цикла из 5 итераций
function startParsingLoop() {
  if (parseInterval) {
    clearInterval(parseInterval);
    parseInterval = null;
  }
  currentParseIter = 1;
  runParseIteration(1);
  parseInterval = setInterval(() => {
    if (currentParseIter >= 5) {
      clearInterval(parseInterval);
      parseInterval = null;
      $parseIterSpan.textContent = 'итерация: завершён';
    } else {
      currentParseIter++;
      runParseIteration(currentParseIter);
    }
  }, 5000);
}

// Обработчик кнопки парсинга
$btnParse.addEventListener('click', () => {
  if (parseInterval) {
    // если уже идёт парсинг – остановить и запустить заново
    clearInterval(parseInterval);
    parseInterval = null;
  }
  startParsingLoop();
});
  </script>
</body>
</html>
